server:
  port: 2333
  address: 0.0.0.0
  http2:
    enabled: false

lavalink:
  plugins:
    - dependency: "dev.lavalink.youtube:youtube-plugin:1.18.0"
      repository: "https://maven.lavalink.dev/releases"

  server:
    password: "youshallnotpass"
    sources:
      youtube: false      # OBRIGATÓRIO: desabilitar extrator embutido quando usando o plugin
      bandcamp: true
      soundcloud: false
      twitch: true
      vimeo: true
      http: true
      local: false
    filters:
      volume: true
      equalizer: true
      karaoke: true
      timescale: true
      tremolo: true
      vibrato: true
      distortion: true
      rotation: true
      channelMix: true
      lowPass: true
    bufferDurationMs: 400
    frameBufferDurationMs: 5000
    opusEncodingQuality: 10
    resamplingQuality: LOW
    trackStuckThresholdMs: 10000
    useSeekGhosting: true
    youtubePlaylistLoadLimit: 6
    playerUpdateInterval: 5
    youtubeSearchEnabled: true
    soundcloudSearchEnabled: false
    gc-warnings: true

# Configuração do youtube-source plugin (conforme documentação oficial)
# https://github.com/lavalink-devs/youtube-source
plugins:
  youtube:
    enabled: true
    allowSearch: true
    allowDirectVideoIds: true
    allowDirectPlaylistIds: true
    # TV = ÚNICO OAuth-compatível | TVHTML5_SIMPLY, WEB, MUSIC = fallbacks
    clients:
      - TV
      - TVHTML5_SIMPLY
      - WEB
      - MUSIC
    oauth:
      enabled: true
      # refreshToken: "COLOCAR_APENAS_NO_VPS"  # NÃO commitar o token! Configurar em /opt/lavalink/application.yml

metrics:
  prometheus:
    enabled: false
    endpoint: /metrics

sentry:
  dsn: ""
  environment: ""

logging:
  file:
    path: ./logs/
  level:
    root: INFO
    lavalink: INFO
  request:
    enabled: true
    includeClientInfo: true
    includeHeaders: false
    includeQueryString: true
    includePayload: true
    maxPayloadLength: 10000
